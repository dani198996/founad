<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - FOUNAD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/founad.css') }}">
</head>
<body>
    <header>
    <div class="header-content">
        <div class="header-left"></div>

        <div class="title-container">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='img/logo-universidad.png') }}" alt="Logo Universidad">
            </div>
            <h1>FOUNAD</h1>
            <p>Financia los proyectos de grado que transforman el futuro</p>
        </div>

        <div class="user-actions">
            {% if session.usuario %}
                <span class="btn-user">Hola, {{ session.usuario }}</span>
                <a href="/logout" class="btn-user">Cerrar sesión</a>
            {% else %}
                <a href="/login" class="btn-user">Iniciar Sesión</a>
                <a href="/registro" class="btn-user">Registrarse</a>
            {% endif %}
        </div>
    </div> <nav class="navbar">
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/proyectos">Proyectos</a>
            <a href="/sube">Publicar</a>
            <a href="/contacto">Contacto</a>
        </div>
    </nav>
</header>

    <div class="container">
        <section class="form-section">
            <h2>Acceso al Sistema</h2>
            <form action="/login" method="POST" class="upload-form">
                <label>Correo Electrónico:</label>
                <input type="email" name="email" required>

                <label>Contraseña:</label>
                <input type="password" name="password" required>

                <button type="submit" class="btn">Ingresar</button>
            </form>
        </section>
    </div>
</body>
</html>
